<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico ARCA</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

fieldset{
    margin-bottom:25px;
    padding:15px;
}

label{
    display:block;
    margin:10px 0;
}

input,select{
    width:100%;
    padding:8px;
    margin-top:5px;
    box-sizing:border-box;
}

button{
    padding:12px 25px;
    cursor:pointer;
}

pre{
    background:#f5f5f5;
    padding:15px;
    border-radius:6px;
    white-space:pre-wrap;
}
</style>

</head>

<body>

<h1>Diagnóstico Framework ARCA</h1>

<form id="formulario">

<h2>Dados do Contato</h2>

<label>
Nome
<input
type="text"
name="nome_usuario"
required>
</label>

<label>
E-mail
<input
type="email"
name="email_usuario"
required>
</label>

<label>
WhatsApp
<input
type="text"
name="whatsapp_usuario"
required>
</label>

<fieldset>

<legend>Atração</legend>

<label>
Site estruturado?

<select name="atracao_site">
<option value="0">Não</option>
<option value="5">Sim</option>
</select>

</label>

<label>
Marketing ativo?

<select name="marketing">
<option value="0">Não</option>
<option value="5">Sim</option>
</select>

</label>

</fieldset>

<fieldset>

<legend>Relacionamento</legend>

<label>
Utiliza CRM?

<select name="crm">
<option value="0">Não</option>
<option value="10">Sim</option>
</select>

</label>

<label>
Follow-up definido?

<select name="followup">
<option value="0">Não</option>
<option value="10">Sim</option>
</select>

</label>

</fieldset>

<fieldset>

<legend>Conversão</legend>

<label>
Processo Comercial?

<select name="processo">
<option value="0">Não</option>
<option value="15">Sim</option>
</select>

</label>

</fieldset>

<fieldset>

<legend>Aceleração</legend>

<label>
Indicadores?

<select name="indicadores">
<option value="0">Não</option>
<option value="15">Sim</option>
</select>

</label>

</fieldset>

<button type="submit">
Gerar Diagnóstico
</button>

</form>

<hr>

<pre id="resultado"></pre>

<script>

document.getElementById("formulario").addEventListener("submit", async function(e){

    e.preventDefault();

    const dados = {};

    new FormData(this).forEach((valor, campo) => {

        switch(campo){

            case "atracao_site":
            case "marketing":
            case "crm":
            case "followup":
            case "processo":
            case "indicadores":
                dados[campo] = Number(valor);
                break;

            default:
                dados[campo] = valor;

        }

    });

    const resposta = await fetch("/processar",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(dados)

    });

    const json = await resposta.json();

    document.getElementById("resultado").textContent =
        JSON.stringify(json,null,4);

});

</script>

</body>
</html>
